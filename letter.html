<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Letter For You</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: "Georgia", serif;
    background: #1e1e2f;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    color: #fff;
}

/* ENVELOPE SCREEN */
#envelopeScreen {
    text-align: center;
    cursor: pointer;
}

.envelope {
    width: 200px;
    height: 130px;
    background: #f5eeef;
    position: relative;
    border-radius: 10px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

/* FLAP */
.envelope::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 0;
    height: 0;
    border-left: 100px solid transparent;
    border-right: 100px solid transparent;
    border-bottom: 70px solid #e6d6d8;
    transform-origin: top;
    transition: transform 0.8s ease;
}

/* OPEN EFFECT */
.envelope.open::before {
    transform: rotateX(180deg);
}

/* LETTER */
#letterBox {
    display: none;
    width: 80%;
    max-width: 500px;
    height: 600px;

    background: repeating-linear-gradient(
        to bottom,
        #fdf6e3 0px,
        #fdf6e3 27px,
        #d6d6d6 28px
    );

    border-radius: 10px;
    box-shadow: 0 0 20px rgba(0,0,0,0.3);

    overflow-y: auto;

    color: #333;
    font-family: "Courier New", monospace;
    line-height: 1.6;
}

#typedText {
    padding: 30px;
    white-space: pre-wrap;
    word-break: break-word;
}

/* FADE OUT */
.fade {
    opacity: 0;
    transition: opacity 1s ease;
}
</style>
</head>

<body>

<!-- ENVELOPE -->
<div id="envelopeScreen" onclick="openEnvelope()">
    <div class="envelope" id="envelope"></div>
    <p style="margin-top:15px;">Tap to open</p>
</div>

<!-- LETTER -->
<div id="letterBox">
    <div id="typedText"></div>
</div>

<!-- AUDIO -->
<audio id="bgMusic" loop>
    <source src="ikaw-lang-patutunguhan.mp3" type="audio/mpeg">
</audio>

<script>

const message = `hi kirs, i hope you're doing okay.

i've been thinking about you a lot lately.

before, i thought i was moving on... but i wasn't.

i miss you more than I admitted.

i'm sorry for my mistakes.

kirs... if there's still a chance, can we try again?`;

function openEnvelope() {
    const envelope = document.getElementById("envelope");
    const screen = document.getElementById("envelopeScreen");
    const letterBox = document.getElementById("letterBox");
    const music = document.getElementById("bgMusic");

    // open animation
    envelope.classList.add("open");

    // play music (must be triggered by click)
    music.volume = 0.5;
    music.play();

    setTimeout(() => {
        screen.classList.add("fade");

        setTimeout(() => {
            screen.style.display = "none";
            letterBox.style.display = "block";
            typeWriter();
        }, 1000);

    }, 700);
}

function typeWriter() {
    const typedText = document.getElementById("typedText");
    let i = 0;

    function typing() {
        if (i < message.length) {
            typedText.textContent += message.charAt(i);
            i++;
            letterBox.scrollTop = letterBox.scrollHeight;
            setTimeout(typing, 35);
        }
    }

    typing();
}
</script>

</body>
</html>
