<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Letter For You</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: "Georgia", serif;
    background: #1e1e2f;
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    height: 100vh;
    padding: 20px;
    overflow: hidden;
}

/* INTRO */
.intro {
    text-align: center;
    font-size: 1.4rem;
    margin-bottom: 30px;
    transition: opacity 1s ease;
    color: #fff;
}

.btn {
    padding: 12px 24px;
    font-size: 1rem;
    background: #f5eeef;
    color: #000;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    background: #b1acad;
    transform: scale(1.05);
}

.letter {
    display: none;
    width: 80%;
    max-width: 550px;
    height: 600px;

    background: repeating-linear-gradient(
        to bottom,
        #fdf6e3 0px,
        #fdf6e3 27px,
        #d6d6d6 28px
    );

    border-radius: 10px;
    box-shadow: 0 0 20px rgba(0,0,0,0.3);

    overflow-y: auto;
    overflow-x: hidden;

    font-family: "Courier New", monospace;
    font-size: 1.1rem;
    line-height: 1.7;
    color: #333;

    scroll-behavior: smooth;
}


#typedText {
    padding: 40px;
    white-space: pre-wrap;
    text-align: left;
    word-wrap: break-word;
    overflow-wrap: break-word;
    max-width: 100%;
    margin: 0 auto;
}
}
</style>
</head>

<body>

<div class="intro" id="introText">
    i hope you read this, even if it's too late.
</div>

<button class="btn" onclick="showLetter()">
    Read it
</button>

<div class="letter" id="letterBox">
    <div id="typedText"></div>
</div>

<!-- Background Music -->
<audio id="bgMusic" loop>
    <source src="ikaw-lang-patutunguhan.mp3" type="audio/mpeg">
    Your browser does not support audio.
</audio>

<script>

const message = `hi kirs, i hope you're doing okay. i've been thinking about you a lot lately, and i couldn't keep it to myself anymore.

before school started, i honestly thought i was slowly moving on. but when i saw you again, i realized i wasn't. i was only distracting myself from how much i still miss you.

being apart gave me a lot of time to reflect. i know i wasn't perfect, and i'm truly sorry for the ways i hurt you. if i could take those moments back, i would.

i know it won't be easy for you to trust me again, and i'm not expecting everything to be okay right away. i know there will be days when you'll doubt me or remember the pain i caused, and i understand that. if you give me the chance, i'm willing to be patient and earn your trust back through my actions, not just my words.

i want to relearn you again—the little things that make you smile, the things that hurt you, and how to love you better than i did before.

i'm not sending this to pressure you. i just wanted to be honest.

kirs, if there's still even the smallest chance, can we try again? i still believe what we had is worth fighting for.`;

function showLetter() {

    // Start music
    const music = document.getElementById("bgMusic");
    music.volume = 0.5; // 50% volume
    music.play().catch(err => console.log(err));

    // Hide intro
    document.getElementById("introText").style.opacity = "0";
    document.querySelector(".btn").style.display = "none";

    setTimeout(() => {

        const letterBox = document.getElementById("letterBox");
        const typedText = document.getElementById("typedText");

        letterBox.style.display = "block";

        let i = 0;

        function typeWriter() {

            if (i < message.length) {

                typedText.textContent += message.charAt(i);
                i++;

                // Auto scroll while typing
                letterBox.scrollTop = letterBox.scrollHeight;

                setTimeout(typeWriter, 80);

            }

        }

        typeWriter();

    }, 300);

}

</script>

</body>
</html>
